
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div style="margin-top: 10px;margin-left: 250px;margin-right: 250px;">
    <h1>游戏基本功能</h1>
    <h2>开始游戏功能</h2>
    <div><p style="font-size: 1.17em;"> 
  当用户进入游戏主界面时，可在界面中下方显眼的位置找到“开始游戏”按钮，点击后用户可进行新游戏，即单词版贪吃蛇游戏。</p>
    </div>
    <h2>运动功能</h2>
    <div>
    <p style="font-size: 1.17em;"> 
	用户可通过使用键盘上的上下左右方位键控制蛇的移动方向，蛇在控制的方向上进行直线前进。</p>
    </div>
   <h2>吃食物功能</h2>
   <div>
   <p style="font-size: 1.17em;"> 
  当界面任意位置出现食物，用户使用方位键控制蛇移动到食物周围，当蛇头碰到食物时则表示贪吃蛇吃到此食物，界面上会在任意位置出现下一个食物，用户再次控制蛇去吃这一食物。</p>
   </div>
    <h2>死亡判定功能</h2>
    <div>
    <p style="font-size: 1.17em;"> 
    当蛇头在前进方向上撞到墙壁，给出死亡判定，并给出用户本次游戏得分。</p>
    </div>
    </div>
</body>
</html>
