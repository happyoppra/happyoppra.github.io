<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>03勿匆匆</title>
		<style type="text/css">
			div{
				width: 200px;
				height: 200px;
				border: 6px solid blue;
				float: right;
			}
			/* #{
				text-indent: 2em;
				font-size: 2em;
				line-height: 1rem;		/--! 1em=2rem --/
				font-family: 楷体 ;
			} */
			#div1{
				float: left;/* 浮动 */
				border-image: url("../img/胶卷.jpg") 400;
				border-width:30px 0px 0px 0px;
				height: 300px;
				width: 450px;
				margin: 0 auto;
				text-align: center;
				vertical-align: middle;
			}
		
			#div2{
				float: right;
				border:10px solid #0000FF;
				width: 200px;
				height: 200px;
				border-left: groove #55aaff;
				border-right: dashed #E9967A;
				border-bottom: dotted #E9967A;
			}
			
			#div3{
				float: left;
				/* clear: right; */
				border: 3px solid #ffffff;
				width: 180px;
				height: 260px;
				font-size: large;
			}
			
			#divParent{
				width: 350px;
				height: 150px;
				position: inherit;
				border:10px solid blue;
				right: 200px;
				top: 250px;
			}
			
			#divChild{
				width: 100px;
				height: 100px;
				position: inherit;
				border:4px solid red;
				left: 200px;	/* 相当于left: 100px; */
				top: 0px;
			}
			
			/* 链接点击设置 */
			a:link{
				color: #ff5500;
			}
			a:visited{
				color: #000000;
			}
			a:hover{
				color: #ffffff;
				position: relative;
				left: 5px;
				top: 5px;
			}
			a:active{
				color: #FF55FF
			}
			.backgroundColor{
				background-color: #ffffff;
				background-image: url(../img/012.jpg);
				background-repeat: unset;
				background-clip: border-box;
				background-position: 0px 0px;
			}
			
			#text{
				border: solid 10px #ff947e;
				background-color: #ffbcae;
				font-size: large;
				float: inline-end;
				height: 50px;
				width: 550px;
			}
			<link href="//netdna.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">

		</style>
	</head>
	<body class="backgroundColor">
		<h1 style="border: dotted thin #E9967A;text-align: center;">元气のTimeLine</h1>

			巴卫君＆奈奈生
		</a></div>

	</body>
