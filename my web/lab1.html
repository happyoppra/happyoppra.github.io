<!DOCTYPE html>
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html;charset=utf-8">
		<title>第一章 First WebGL Demo</title>
		<!-- 顶点着色器和片元着色器代码 -->
		<script id="vertex-shader" type="x-shader/x-vertex">
			attribute vec4 vPosition;
			void main(){
				gl_Position = vPosition;
			}
		</script>
		
		<script id="fragment-shader" type="x-shader/x-fragment">
			precision mediump float;
			void main(){
				gl_FragColor = vec4( 1.0, 0.0, 0.0, 1.0 );
			}
		</script>
		<!-- 一组相关的JS库 -->
		<script type="text/javascript" src="./js/common/webgl-utils.js"></script>
		<script type="text/javascript" src="./js/common/initShaders.js"></script>
		<script type="text/javascript" src="./js/common/gl-matrix-min.js"></script>
		
		<!-- 绘制三角形的JS代码 -->
		<script type="text/javascript" src="./js/ch01/triangle.js"></script>
		
	</head>
	<body>
		<a href="https://liyi1003zcmu.github.io/CourseWare/CGChapters/Chapter1/Chapter-1-lab1.html">lab1-2.3. 绘制三角形<br /></a>
		首先，确定程序所在目录，建立程序运行所需环境，保证相关js库已能正常装载
		第二步，建立网页test.html，所有代码见课件
		第三步，建立绘制所需JavaScript脚本，放在js相关目录下，源代码见课件
		第四步，在浏览器中打开网页test.html，如果能够看到如下图所示效果，表明所有环境已搭建正常，程序可正常运行。如果不能，请仔细检查<br />
		<canvas id="triangle-canvas" style="border:none;" width="500" height="500"></canvas>  <!-- 创建Html5 canvas -->
	
	</body>
</html>
